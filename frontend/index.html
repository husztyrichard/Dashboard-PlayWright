<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>QA Dashboard</h1>
        <p>Software Testing Management</p>
    </header>


    <section class="cards">

    <div class="card">
        <h3>Total Bugs</h3>
        <span id="totalBugs">0</span>
    </div>

    <div class="card">
        <h3>Open Bugs</h3>
        <span id="openBugs">0</span>
    </div>

   <div class="card">
    <h3>API STATUS</h3>
    <p id="systemStatus">Checking...</p>
</div>

</section>


    <section class="bugs">

        <h2>Recent Bugs</h2>

        <table data-cy="bug-table">

            <thead>
                <tr>
                    <th>ID</th>
                    <th>Title</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="bugTableBody">

            </tbody>

        </table>

    </section>


    <button id="createBugBtn" data-cy="create-bug-button">
        + Create Bug
    </button>


    <div id="bugModal" class="modal">

    <div class="modal-content">

        <button id="closeModal" class="close-btn">×</button>

        <h2>Create New Bug</h2>

            <input 
                id="bugTitle" 
                data-cy="bug-title-input"
                placeholder="Bug title">


            <select id="priority">

                <option value="HIGH">HIGH</option>
                <option value="MEDIUM">MEDIUM</option>
                <option value="LOW">LOW</option>

            </select>


            <button id="saveBug" data-cy="save-bug-button">
                Save Bug
            </button>


        </div>

    </div>
<div id="statusModal" class="modal">

    <div class="modal-content">

        <button id="closeStatusModal" class="close-btn">×</button>

        <h2>Change Status</h2>

        <button 
    data-cy="status-testing"
    onclick="selectStatus('TESTING')">
    TESTING
</button>

<button 
    data-cy="status-closed"
    onclick="selectStatus('CLOSED')">
    CLOSED
</button>

    </div>


</div>


<script src="script.js"></script>

</body>

</html>
