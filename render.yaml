services:
  - type: web
    name: dashboard-api
    env: node
    plan: free
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://your-vercel-app.vercel.app,http://localhost:5500,http://127.0.0.1:5500
