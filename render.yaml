services:
  - type: web
    name: dashboard-api
    env: node
    plan: free
    buildCommand: cd backend && npm ci
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: http://localhost:5500,http://127.0.0.1:5500
        # Add your Vercel frontend origin here, for example: https://your-app.vercel.app
